# =================================================
# APPLICATION
# =================================================
spring.application.name=home-service
spring.profiles.active=${SPRING_PROFILE:dev}

# run as worker (NO HTTP SERVER)
spring.main.web-application-type=none

# console logging color
logging.pattern.console=%clr(%d{HH:mm:ss}){faint} %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n
spring.output.ansi.enabled=always

logging.level.org.springframework.boot.autoconfigure=ERROR
# =================================================
# APP ENV
# =================================================
app.env=${NODE_ENV:development}


# =================================================
# RABBITMQ
# =================================================
spring.rabbitmq.host=${RABBITMQ_HOST:127.0.0.1}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}

# listener performance
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=10
spring.rabbitmq.listener.simple.prefetch=5

# retry (important for queue consumer)
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.max-attempts=5
spring.rabbitmq.listener.simple.retry.multiplier=2


# =================================================
# MONGODB DATABASE
# =================================================
spring.data.mongodb.uri=${DATABASE_URL:mongodb://localhost:27017/smartcollab}
spring.data.mongodb.auto-index-creation=true


# =================================================
# HIKARI CONNECTION POOL
# =================================================
spring.datasource.hikari.pool-name=NotificationPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000


# =================================================
# JPA / HIBERNATE
# =================================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true


# =================================================
# REDIS (CACHE / RATE LIMIT / TEMP DATA)
# =================================================
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DB:0}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000


# =================================================
# MAIL SMTP
# =================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# =================================================
# JSON / JACKSON
# =================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC


# =================================================
# LOGGING
# =================================================
logging.level.root=INFO
logging.level.org.springframework.amqp=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.file.name=logs/notification-service.log
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.max-file-size=10MB


# =================================================
# ACTUATOR (optional monitoring)
# =================================================
management.endpoint.health.show-details=always