[build]
builder = "NIXPACKS"
command = "pnpm --filter api-gateway --filter auth --filter project --filter ai-service --filter realtime run build"

[install]
command = "pnpm install"

[deploy]
startCommand = "pnpm -r --parallel --filter api-gateway --filter auth --filter project --filter ai-service --filter realtime run start"
restartPolicyType = "ON_FAILURE"