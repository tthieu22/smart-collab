[build]
builder = "NIXPACKS"
buildCommand = """
pnpm install
cd apps/api-gateway && pnpm install && pnpm run build && cd ../..
cd apps/auth && pnpm install && pnpm run build && cd ../..
cd apps/project && pnpm install && pnpm run build && cd ../..
cd apps/ai-service && pnpm install && pnpm run build && cd ../..
cd apps/realtime && pnpm install && pnpm run build && cd ../..
"""

[deploy]
startCommand = "pnpm --filter api-gateway start & pnpm --filter auth start & pnpm --filter project start & pnpm --filter ai-service start & pnpm --filter realtime start"

restartPolicyType = "ON_FAILURE"